# MiniVNC statsd → OpenTelemetry Collector (debene cluster)
#
# Receives statsd/UDP metrics from MiniVNC on the PowerPC Mac (fio A1-A4) and
# exposes them for the existing kube-prometheus-stack to scrape. Ingress is a
# dedicated MetalLB VIP (10.0.100.116:8125/UDP); the collector→Prometheus side is
# a Prometheus /metrics endpoint scraped via a ServiceMonitor (fio B3).
#
# Apply with:  kubectl --context debene apply -f deploy/otel-collector.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: minivnc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          # contrib image — the statsd receiver is a contrib-only component.
          image: otel/opentelemetry-collector-contrib:0.116.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: statsd
              containerPort: 8125
              protocol: UDP
            - name: metrics          # Prometheus exposition (scraped in fio B3)
              containerPort: 8889
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
  labels:
    app: otel-collector
data:
  config.yaml: |
    receivers:
      statsd:
        endpoint: 0.0.0.0:8125
        # MiniVNC flushes every 1s; aggregate a few flushes per scrape window.
        aggregation_interval: 10s
        # Keep clean metric names (no _counter/_gauge suffix); type comes from
        # the statsd |c / |g / |ms suffix on each line.
        enable_metric_type: false
        # MiniVNC sends per-second counter deltas (|c); accumulate them into a
        # monotonic cumulative counter so Grafana rate() works.
        is_monotonic_counter: true
        timer_histogram_mapping:
          - statsd_type: "timing"     # minivnc.frame_ms |ms
            observer_type: "gauge"

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        metric_expiration: 5m
        resource_to_telemetry_conversion:
          enabled: true

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [statsd]
          exporters: [prometheus]
---
# Ingress: dedicated MetalLB VIP on the 10.0.100.x pool so the PowerPC Mac sends
# statsd straight to 10.0.100.116:8125/UDP (mirrors gopher-spot/log-sink). Must
# match STATSD_HOST/STATSD_PORT in mac-cpp-source/main.cpp (fio A2).
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-statsd
  namespace: observability
  labels:
    app: otel-collector
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.0.100.116
spec:
  type: LoadBalancer
  selector:
    app: otel-collector
  ports:
    - name: statsd
      port: 8125
      targetPort: 8125
      protocol: UDP
---
# Scrape target: cluster-internal /metrics for the kube-prometheus-stack operator.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-metrics
  namespace: observability
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: metrics
      port: 8889
      targetPort: 8889
      protocol: TCP
---
# release: monitoring matches the operator's serviceMonitorSelector; its
# namespaceSelector is empty (all namespaces), so this is picked up here.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: observability
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: otel-collector
  namespaceSelector:
    matchNames: [observability]
  endpoints:
    - port: metrics          # only the ClusterIP service exposes this port
      path: /metrics
      interval: 30s
